name: Archive articles

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run archive script
        run: npx tsx scripts/archive-articles.ts

      - name: Commit and push if changed
        run: |
          git config user.name "mnews-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data/archive.json; then
            git add data/archive.json
            git commit -m "chore: archive new articles [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
