name: Daily digest email

on:
  schedule:
    - cron: "0 23 * * *" # 23:00 UTC = 08:00 JST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Send daily digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: npx tsx scripts/daily-digest.ts

      - name: Commit generated tweet text if changed
        run: |
          git config user.name "mnews-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data/tweet-digest.txt; then
            git add data/tweet-digest.txt
            git commit -m "chore: update X post draft [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
