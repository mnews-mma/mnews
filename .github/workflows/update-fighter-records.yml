name: Update fighter records

on:
  schedule:
    - cron: "30 17 * * *" # 毎日 JST 2:30 (UTC 17:30)。0:17(org-rankings)・8:00(daily-digest)と非衝突
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Update fighter records
        run: npx tsx scripts/update-fighter-records.ts

      - name: Update mnews rating rankings
        run: npx tsx scripts/update-mnews-rating.ts

      - name: Commit and push if changed
        run: |
          git config user.name "mnews-bot"
          git config user.email "actions@users.noreply.github.com"
          # data/rankings.legitimateBaseline.json: update-mnews-rating.tsのnew-results
          # モード(このジョブの既定実行)は毎回このファイルを前進させて書き出すが、
          # 従来ここのgit add対象に含まれていなかったためコミットされず、CI実行の
          # たびに書き捨てられていた(2026-07-20 19:28以降凍結)。baselineが前進しない
          # と、後日--mode=data-correctionを実行した際のripple検出(auditRankingsRipple)
          # が古い基準と比較し続け、無関係な選手のdeltaまで誤ってゼロに抑制する。
          if ! git diff --quiet -- data/fighterRecords.json data/rankings.json data/rankings.prev.json data/rankings/archive data/rankings.legitimateBaseline.json; then
            git add data/fighterRecords.json data/rankings.json data/rankings.prev.json data/rankings/archive data/rankings.legitimateBaseline.json
            git commit -m "chore: update fighter records + mnews rating [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
