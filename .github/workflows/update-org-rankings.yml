name: Update org rankings

on:
  schedule:
    - cron: "17 15 * * *" # 毎日 JST 0:17 (UTC 15:17)。ランキングは高頻度更新ではない
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Update org rankings
        run: npx tsx scripts/update-org-rankings.ts

      - name: Commit and push if changed
        run: |
          git config user.name "mnews-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data/orgRankings.json data/orgRankings-prev.json; then
            git add data/orgRankings.json data/orgRankings-prev.json
            git commit -m "chore: update org rankings [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
